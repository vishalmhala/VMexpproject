<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url('Background.png'); /* Updated overlay to 80% opacity */
            background-size: cover; /* Ensures the image covers the entire background */
            background-position: center; /* Centers the image */
            background-repeat: no-repeat; /* Prevents the image from repeating */
        }
        .login-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .login-container h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-container label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .login-container input {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px; /* Updated margin to 16px */
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding and borders are included in the element's total width and height */
        }
        .login-container input#username {
            background-image: url('data:image/svg+xml;charset=UTF-8,%3Csvg xmlns%3D%22http%3A//www.w3.org/2000/svg%22 viewBox%3D%220 0 24 24%22 fill%3D%22none%22 stroke%3D%22currentColor%22 stroke-width%3D%222%22 stroke-linecap%3D%22round%22 stroke-linejoin%3D%22round%22%3E%3Cpath d%3D%22M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z%22/%3E%3Cpolyline points%3D%2222%2C6 12%2C13 2%2C6%22/%3E%3C/svg%3E');
            background-repeat: no-repeat;
            background-position: 10px center;
            background-size: 20px;
            padding-left: 40px; /* Adjust padding to make space for the icon */
            margin-bottom: 32px; /* Added padding between input#username and label for password */
        }
        .login-container input#username:hover, .login-container input#password:hover {
            border-color: #007BFF; /* Change border color on hover */
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5); /* Add a subtle glow effect */
        }
        .login-container button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .login-container button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Login</h1>
        <form action="/login" method="POST" novalidate> <!-- Added novalidate to disable default validation tooltips -->
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Mail ID" required list="email-suggestions">
            <datalist id="email-suggestions">
                <option value="vishal.m.mhala@gmail.com">
                <option value="vishal.mhala@energyexemplar.com">
            </datalist>
            <div id="username-error" style="color: red; font-size: 12px; margin-top: 8px;"></div> <!-- Adjusted margin to 8px and ensured it is below input#username -->

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        document.getElementById('username').addEventListener('input', function() {
            const validEmails = ["vishal.m.mhala@gmail.com", "vishal.mhala@energyexemplar.com"];
            const errorElement = document.getElementById('username-error');

            if (!validEmails.includes(this.value) && this.value !== "") {
                errorElement.textContent = "Invalid email address.";
            } else {
                errorElement.textContent = "";
            }
        });
    </script>
</body>
</html>
